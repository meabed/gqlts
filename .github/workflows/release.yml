name: Release
on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true
  push:
    paths:
      - 'cli/**'
      - 'runtime/**'
      - '.changeset/**'
      - 'package.json'
      - 'yarn.lock'
      - 'scripts/release/**'
      - '.github/workflows/release.yml'
    branches:
      - 'master'
      - 'develop'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  CI: true

jobs:
  Release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Yarn
        run: |
          yarn install --frozen-lockfile --ignore-scripts

      - name: Verify npm authentication
        run: npm whoami --registry https://registry.npmjs.org

      - name: Disable AppArmor
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - name: Verify release inputs
        run: yarn release:verify

      - name: Ensure verification did not modify tracked files
        run: git diff --exit-code

      - name: Create Release Pull Request or Publish Packages
        id: changesets
        uses: changesets/action@v1
        with:
          branch: "changeset-release/${{ github.ref_name }}"
          commit: "chore(release): version packages (${{ github.ref_name }})"
          title: "Version Packages (${{ github.ref_name }})"
          version: "${{ github.ref_name == 'develop' && 'yarn release:version:beta' || 'yarn release:version:stable' }}"
          publish: yarn release:publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_CHANNEL: ${{ github.ref_name == 'develop' && 'beta' || 'latest' }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
